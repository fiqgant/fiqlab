name: Lighthouse

on:
  deployment_status:

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    if: github.event.deployment_status.state == 'success'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ github.event.deployment_status.target_url }}
            ${{ github.event.deployment_status.target_url }}/blog
            ${{ github.event.deployment_status.target_url }}/publications
          uploadArtifacts: true
          temporaryPublicStorage: true
        id: lighthouse

      - name: Format results
        id: format
        run: |
          {
            echo "results<<EOF"
            for json in .lighthouseci/*.report.json; do
              url=$(jq -r '.finalUrl' "$json")
              pathname=$(node -e "try{const u=new URL('$url');console.log(u.pathname||'/')}catch(e){console.log('/')}")
              perf=$(jq -r '(.categories.performance.score * 100) | round' "$json")
              a11y=$(jq -r '(.categories.accessibility.score * 100) | round' "$json")
              bp=$(jq -r '(.categories["best-practices"].score * 100) | round' "$json")
              seo=$(jq -r '(.categories.seo.score * 100) | round' "$json")
              echo "**${pathname}**"
              echo "| Metric | Score |"
              echo "|---|---|"
              echo "| Performance | ${perf} |"
              echo "| Accessibility | ${a11y} |"
              echo "| Best Practices | ${bp} |"
              echo "| SEO | ${seo} |"
              echo ""
            done
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Comment on commit
        uses: peter-evans/commit-comment@v3
        with:
          body: |
            ## Lighthouse Results

            ${{ steps.format.outputs.results }}

            > Full report: ${{ steps.lighthouse.outputs.links }}
