name: Scholar Sync

on:
  schedule:
    # Every Sunday at 00:00 UTC
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  sync:
    name: Sync Google Scholar Data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Fetch Scholar data
        run: |
          curl -sf \
            "https://serpapi.com/search.json?engine=google_scholar_author&author_id=${{ secrets.GOOGLE_SCHOLAR_AUTHOR_ID }}&api_key=${{ secrets.SERPAPI_KEY }}" \
            -o /tmp/scholar_raw.json

          node -e "
            const raw = JSON.parse(require('fs').readFileSync('/tmp/scholar_raw.json', 'utf8'));
            const articles = (raw.articles || []).map(a => ({
              title: a.title,
              link: a.link,
              authors: a.authors,
              publication: a.publication,
              citedBy: a.cited_by?.value ?? 0,
              year: a.year,
              citationId: a.citation_id,
            }));
            const cache = {
              fetchedAt: new Date().toISOString(),
              authorId: '${{ secrets.GOOGLE_SCHOLAR_AUTHOR_ID }}',
              articles,
            };
            require('fs').writeFileSync('data/scholar-cache.json', JSON.stringify(cache, null, 2));
            console.log('Synced ' + articles.length + ' articles');
          "

      - name: Commit updated cache
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: sync scholar cache [skip ci]"
          file_pattern: data/scholar-cache.json
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
