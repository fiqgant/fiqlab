name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_MAPBOX_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          GOOGLE_SCHOLAR_AUTHOR_ID: ${{ secrets.GOOGLE_SCHOLAR_AUTHOR_ID }}
          GITHUB_USERNAME: ${{ secrets.GH_USERNAME }}
          NEXT_PUBLIC_SHOW_SYNC: false
