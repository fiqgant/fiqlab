name: 'Check Setup'\n\ndescription: 'Check if the repository is correctly set up'\n\ninputs:\n  version:\n    description: 'The version of pnpm to install'\n    required: true\n    default: '9.4.0'\n\nruns:\n  using: 'node16'\n  steps:\n    - name: 'Set up pnpm'\n      uses: pnpm/action-setup@v9.4.0\n      with:\n        version: ${{ inputs.version }}\n        node-version: '16'